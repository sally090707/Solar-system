<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; overflow: hidden; }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            color: white;
            font-family: Arial;
            z-index: 100;
            pointer-events: auto;
        }
        button, input {
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <div id="controls">
        <div>
            <label>公转速度: </label>
            <input type="range" id="speedSlider" min="0" max="0.05" step="0.001" value="0.02">
            <span id="speedValue">0.02</span>
        </div>
        <button id="pauseBtn">暂停</button>
        <button id="resumeBtn">继续</button>
    </div>

    <!-- 使用国内 CDN，更稳定 -->
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    
    <script>
        // 等待页面加载完成
        window.onload = function() {
            // 1. 创建场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); // 黑色背景
            
            // 2. 创建相机
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, 0);
            
            // 3. 创建渲染器
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            // 4. 创建太阳
            const sunGeometry = new THREE.SphereGeometry(1.5, 32, 32);
            const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
            const sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);
            
            // 5. 创建地球
            const earthGeometry = new THREE.SphereGeometry(0.7, 32, 32);
            const earthMaterial = new THREE.MeshBasicMaterial({ color: 0x2299ff });
            const earth = new THREE.Mesh(earthGeometry, earthMaterial);
            scene.add(earth);
            
            // 6. 创建火星
            const marsGeometry = new THREE.SphereGeometry(0.6, 32, 32);
            const marsMaterial = new THREE.MeshBasicMaterial({ color: 0xff6633 });
            const mars = new THREE.Mesh(marsGeometry, marsMaterial);
            scene.add(mars);
            
            // 7. 创建木星
            const jupiterGeometry = new THREE.SphereGeometry(1.1, 32, 32);
            const jupiterMaterial = new THREE.MeshBasicMaterial({ color: 0xc88e3d });
            const jupiter = new THREE.Mesh(jupiterGeometry, jupiterMaterial);
            scene.add(jupiter);
            
            // 8. 轨道半径
            const earthRadius = 4;
            const marsRadius = 5.5;
            const jupiterRadius = 7.5;
            
            // 初始位置
            earth.position.set(earthRadius, 0, 0);
            mars.position.set(marsRadius, 0, 0);
            jupiter.position.set(jupiterRadius, 0, 0);
            
            // 9. 添加轨道线
            function addOrbit(radius, color) {
                const points = [];
                for (let i = 0; i <= 128; i++) {
                    const angle = (i / 128) * Math.PI * 2;
                    const x = radius * Math.cos(angle);
                    const z = radius * Math.sin(angle);
                    points.push(new THREE.Vector3(x, 0, z));
                }
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: color });
                const orbit = new THREE.LineLoop(geometry, material);
                scene.add(orbit);
            }
            
            addOrbit(earthRadius, 0xffffff);
            addOrbit(marsRadius, 0xffffff);
            addOrbit(jupiterRadius, 0xffffff);
            
            // 10. 动画变量
            let earthAngle = 0;
            let marsAngle = 0;
            let jupiterAngle = 0;
            let speed = 0.02;
            let paused = false;
            
            // 11. 控制面板
            const slider = document.getElementById('speedSlider');
            const speedSpan = document.getElementById('speedValue');
            const pauseBtn = document.getElementById('pauseBtn');
            const resumeBtn = document.getElementById('resumeBtn');
            
            if (slider) {
                slider.addEventListener('input', function(e) {
                    speed = parseFloat(e.target.value);
                    speedSpan.innerText = speed;
                });
            }
            
            if (pauseBtn) {
                pauseBtn.addEventListener('click', function() {
                    paused = true;
                });
            }
            
            if (resumeBtn) {
                resumeBtn.addEventListener('click', function() {
                        paused=false;
                });
            }
function animate() {
                if (!paused) {
                    earthAngle += speed;
                    marsAngle += speed * 0.85;
                    jupiterAngle += speed * 0.4;
                }
                
                earth.position.x = earthRadius * Math.cos(earthAngle);
                earth.position.z = earthRadius * Math.sin(earthAngle);
                
                mars.position.x = marsRadius * Math.cos(marsAngle);
                mars.position.z = marsRadius * Math.sin(marsAngle);
jupiter.position.x = jupiterRadius * Math.cos(jupiterAngle);
                jupiter.position.z = jupiterRadius * Math.sin(jupiterAngle);
                
                sun.rotation.y += 0.01;
                
                renderer.render(scene, camera);
                requestAnimationFrame(animate);
            }
animate();
            
            // 13. 窗口大小自适应
            window.addEventListener('resize', function() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
